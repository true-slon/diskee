version: '3.8'
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: diskee
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: diskee-redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ../diskee-project/.
    ports:
      - "8080:8080"
    environment:
      API_DB_HOST: db
      API_DB_PASSWORD: ${DB_PASSWORD}
      API_DB_SCHEMA: diskee
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      - db
      - redis
  ui:
    build: ../diskee-frontend/.
    ports:
      - "3000:80"
    depends_on:
      - app
volumes:
  pgdata:
  redis_data:
