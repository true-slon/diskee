version: '3.8'
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: diskee
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: ../diskee-project/.
    ports:
      - "8080:8080"
    environment:
      API_DB_HOST: db
      API_DB_PASSWORD: ${DB_PASSWORD}
      API_DB_SCHEMA: diskee
    depends_on:
      - db

volumes:
  pgdata: